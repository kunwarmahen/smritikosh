# Production Compose file.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# All secrets are supplied via environment variables or a .env file that you
# create alongside this file.  Never commit secrets to version control.
#
# Required environment variables (set in your .env or deployment platform):
#
#   POSTGRES_PASSWORD      — strong random password for the database
#   NEO4J_PASSWORD         — must be ≥ 8 characters (Neo4j requirement)
#   JWT_SECRET             — long random string (openssl rand -hex 32)
#   LLM_PROVIDER           — claude | openai | gemini | ollama
#   LLM_MODEL              — e.g. claude-haiku-4-5-20251001
#   LLM_API_KEY            — provider API key
#   EMBEDDING_PROVIDER     — same options as LLM_PROVIDER
#   EMBEDDING_MODEL        — e.g. text-embedding-3-small
#   EMBEDDING_API_KEY      — provider API key (may be same as LLM_API_KEY)
#
# Optional:
#   MONGODB_URL            — if omitted, audit trail is disabled
#   PORT                   — backend port (default: 8080)

services:

  # ── Databases ───────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: smritikosh
      POSTGRES_USER: smritikosh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smritikosh"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed to the host — only reachable inside the compose network
    expose:
      - "5432"

  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 5
    expose:
      - "7687"

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: smritikosh_audit
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
    expose:
      - "27017"

  # ── Backend ─────────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: smritikosh-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Database URLs constructed from service names inside the compose network
      DATABASE_URL: postgresql+asyncpg://smritikosh:${POSTGRES_PASSWORD}@postgres:5432/smritikosh
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MONGODB_URL: ${MONGODB_URL:-mongodb://mongodb:27017}

      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:?LLM_PROVIDER is required}
      LLM_MODEL: ${LLM_MODEL:?LLM_MODEL is required}
      LLM_API_KEY: ${LLM_API_KEY:-}

      # Embeddings
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:?EMBEDDING_PROVIDER is required}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:?EMBEDDING_MODEL is required}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}

      # Optional tuning — defaults are used if not set
      RATE_LIMIT_ENCODE: ${RATE_LIMIT_ENCODE:-60/minute}
      RATE_LIMIT_CONTEXT: ${RATE_LIMIT_CONTEXT:-60/minute}
      RATE_LIMIT_SEARCH: ${RATE_LIMIT_SEARCH:-120/minute}
      FACT_DECAY_HALF_LIFE_DAYS: ${FACT_DECAY_HALF_LIFE_DAYS:-60.0}
      FACT_DECAY_FLOOR: ${FACT_DECAY_FLOOR:-0.1}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  neo4j_data:
  mongodb_data:
